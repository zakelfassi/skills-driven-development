<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none" role="img" aria-label="SkDD favicon">
  <title>SkDD</title>
  <defs>
    <!--
      prefers-color-scheme media query inside SVG:
      dark  → dark background (#0f172a→#1e293b) + forge colours
      light → light background (#f8fafc) + slightly deeper loop colour
    -->
    <style>
      @media (prefers-color-scheme: dark) {
        .bg    { fill: url(#fv-bg-dark); }
        .loop  { stroke: #38bdf8; }
        .dot   { fill: #38bdf8; }
        .spark { fill: #fef3c7; }
        .hole  { fill: #0f172a; }
      }
      @media (prefers-color-scheme: light) {
        .bg    { fill: #f8fafc; }
        .loop  { stroke: #0284c7; }
        .dot   { fill: #0284c7; }
        .spark { fill: #f59e0b; }
        .hole  { fill: #1e293b; }
      }
    </style>
    <linearGradient id="fv-bg-dark" x1="0" y1="0" x2="128" y2="128" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="fv-anvil" x1="32" y1="40" x2="96" y2="96" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#ef4444"/>
    </linearGradient>
  </defs>

  <!-- Background (colour-scheme aware) -->
  <rect class="bg" width="128" height="128" rx="24"/>

  <!-- Anvil (forge gradient — same in both schemes) -->
  <path d="M26 92 H102 V100 H92 V108 H36 V100 H26 Z" fill="url(#fv-anvil)"/>
  <path d="M34 76 H94 L102 92 H26 Z" fill="url(#fv-anvil)"/>
  <path d="M94 76 L114 72 L110 82 L94 82 Z" fill="url(#fv-anvil)"/>

  <!-- Spark diamond -->
  <path class="spark" d="M64 44 L70 58 L64 72 L58 58 Z" opacity="0.95"/>
  <circle class="hole" cx="64" cy="58" r="3"/>

  <!-- Loop arc -->
  <path class="loop"
    d="M18 58 Q 18 22, 64 22 Q 110 22, 110 58"
    fill="none" stroke-width="4" stroke-linecap="round"/>
  <circle class="dot" cx="18" cy="58" r="4"/>
  <circle class="dot" cx="110" cy="58" r="4"/>
</svg>
