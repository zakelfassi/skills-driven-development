name: Publish CLI

# Manual fallback publisher only.
#
# The automatic, post-release publish lives in release-please.yml (it publishes in
# the same run that creates the GitHub Release). That is necessary because
# release-please creates the release using GITHUB_TOKEN, and GITHUB_TOKEN-emitted
# events do NOT cascade to trigger other workflows — so a `release: published`
# trigger here would never fire automatically. We therefore deliberately keep this
# workflow as `workflow_dispatch` ONLY, to be invoked manually
# (`gh workflow run publish-cli.yml --ref vX.Y.Z`) if the automatic path ever needs
# to be re-run. This also guarantees there is exactly one automatic publisher and
# no risk of a double publish.
#
# Keep the publish steps below byte-for-byte equivalent to release-please.yml's
# publish job, including npm OIDC trusted publishing: Node 24, npm@latest, NO
# registry-url, NO NODE_AUTH_TOKEN, and `id-token: write`.
on:
  workflow_dispatch:

jobs:
  publish:
    name: Publish skdd to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: cli/pnpm-lock.yaml

      - name: Install CLI deps
        working-directory: cli
        run: pnpm install --frozen-lockfile

      - name: Run tests
        working-directory: cli
        run: pnpm test

      - name: Build CLI
        working-directory: cli
        run: pnpm build

      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@latest

      # OIDC trusted publishing: no registry-url/token npmrc so npm mints an OIDC token
      - name: Publish to npm
        working-directory: cli
        run: npm publish --provenance --access public

      # Marketplace submissions (SkillsMP, Skills.sh, ClawHub, Claude Code Marketplace)
      # are intentionally deferred to a future milestone - see the P4 section of the
      # project roadmap. This workflow publishes the CLI only; colony submissions
      # will be added when .colony.json v1 stabilizes.
